<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Polaris Kernel</title>

    <!-- Carga critica de MathJax para renderizado inmediato -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']],
                processEscapes: true
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

    <link rel="stylesheet" href="{{PREFIX}}styles.css">
    <script defer src="{{PREFIX}}scripts.js"></script>
</head>

<body>
<div class="container">

<header>
    <h1>{{TITLE}}</h1>
    <button id="theme-toggle" class="btn-theme">MODE</button>
</header>

<nav>
    <a href="{{PREFIX}}index.html" class="nav-btn">Inicio</a>
    <a href="{{PREFIX}}index.html" class="nav-btn">Contenidos</a>
</nav>

<main id="md-content">
{{BODY}}
</main>

</div>
</body>
</html>
